name: Java CI with Maven with Windows and Mac

on:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-12, windows-latest]

    name: Build with Java 8 on ${{ matrix.os }}
    env:
      workdir: inventorymanager

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven (Unix)
        if: ${{ runner.os != 'Windows' }}
        run: ./mvnw -B test
        working-directory: ${{ env.workdir }}

      - name: Build with Maven (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: .\\mvnw.cmd -B test
        working-directory: ${{ env.workdir }}
