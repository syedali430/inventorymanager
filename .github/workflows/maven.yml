name: Java CI with Maven in Linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: 8
            coverage: false
            skip_gui: true
          - java: 11
            coverage: true
            skip_gui: false

    name: Build with Java ${{ matrix.java }} on Linux
    env:
      workdir: inventorymanager
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-jdk${{ matrix.java }}-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-m2-jdk${{ matrix.java }}-
            ${{ runner.os }}-m2-

      - name: Build with Maven (skip GUI)
        if: ${{ !matrix.coverage && matrix.skip_gui }}
        run: xvfb-run ./mvnw -B verify -Pskip-gui-tests
        working-directory: ${{ env.workdir }}

      - name: Build with Maven
        if: ${{ !matrix.coverage && !matrix.skip_gui }}
        run: xvfb-run ./mvnw -B verify
        working-directory: ${{ env.workdir }}

      - name: Build with Maven (coverage)
        if: ${{ matrix.coverage }}
        run: xvfb-run ./mvnw -B -Pjacoco test jacoco:report
        working-directory: ${{ env.workdir }}

      - name: Verify JaCoCo XML for Coveralls
        if: ${{ matrix.coverage }}
        run: |
          set -e
          if [ ! -f target/site/jacoco/jacoco.xml ]; then
            echo "jacoco.xml not found under target/site/jacoco/"
            find target -maxdepth 4 -name jacoco.xml -print
            exit 1
          fi
        working-directory: ${{ env.workdir }}

      - name: Upload coverage to Coveralls
        if: ${{ matrix.coverage }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.workdir }}/target/site/jacoco/jacoco.xml
          format: jacoco

      - name: Generate JUnit Report
        if: ${{ always() }}
        run: xvfb-run ./mvnw -B surefire-report:report-only site:site -DgenerateReports=false
        working-directory: ${{ env.workdir }}

      - name: Archive JUnit Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report-jdk-${{ matrix.java }}
          path: ${{ env.workdir }}/target/site
