name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      workdir: inventorymanager

    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clones should be disabled for a better relevancy of SonarQube analysis
          fetch-depth: 0
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build with Maven
        if: ${{ env.COVERALLS_REPO_TOKEN == '' }}
        run: xvfb-run ./mvnw -B verify -Pjacoco -Dsonar.skip=true
        working-directory: ${{ env.workdir }}
      - name: Build with Maven (coveralls)
        if: ${{ env.COVERALLS_REPO_TOKEN != '' }}
        run: xvfb-run ./mvnw -B verify -Dcoveralls.token=${{ env.COVERALLS_REPO_TOKEN }} -Dsonar.skip=true
        working-directory: ${{ env.workdir }}
      - name: SonarCloud Analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          xvfb-run ./mvnw -B -DskipTests=true -Pjacoco sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.projectKey=syedali430_inventorymanager2
        working-directory: ${{ env.workdir }}
