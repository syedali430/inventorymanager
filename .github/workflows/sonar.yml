name: Java CI with Maven, Docker and SonarCloud in Linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
    - uses: actions/checkout@v3
      with:
        # Shallow clones should be disabled for a better relevancy of SonarQube analysis
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.m2
          ~/.sonar/cache
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml') }}
        restore-keys: ${{ runner.os }}-m2-
    - name: Build with Maven (tests only)
      run: xvfb-run mvn verify -Dsonar.skip=true
      working-directory: inventorymanager

    - name: SonarCloud Analysis
      if: ${{ env.SONAR_TOKEN != '' }}
      run: >
        xvfb-run mvn -DskipTests=true -Pjacoco sonar:sonar
        -Dsonar.organization=syedali430
        -Dsonar.host.url=https://sonarcloud.io
        -Dsonar.projectKey=syedali430_inventorymanager
      working-directory: inventorymanager
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


